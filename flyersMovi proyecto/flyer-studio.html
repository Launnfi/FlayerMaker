<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 FlyerStudio — Para estéticas</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rosa:     #C4748A;
      --rosa-osc: #A85568;
      --rosa-pal: #F7EEF1;
      --dorado:   #D4A853;
      --negro:    #1A1018;
      --gris:     #6B5A60;
      --blanco:   #FFFBFC;
      --sombra:   0 8px 40px rgba(168,85,104,.15);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--rosa-pal);
      color: var(--negro);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--negro);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-logo { font-size: 28px; }
    .header-titulo {
      font-family: 'Playfair Display', serif;
      color: var(--blanco);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -.3px;
    }
    .header-sub {
      color: var(--rosa);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── LAYOUT ── */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      min-height: calc(100vh - 72px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--blanco);
      border-right: 1px solid rgba(196,116,138,.15);
      padding: 28px 24px;
      overflow-y: auto;
      max-height: calc(100vh - 72px);
      position: sticky;
      top: 0;
    }

    .seccion-titulo {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--rosa);
      margin-bottom: 12px;
      margin-top: 24px;
    }
    .seccion-titulo:first-child { margin-top: 0; }

    .campo {
      margin-bottom: 14px;
    }
    .campo label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--gris);
      margin-bottom: 5px;
    }
    .campo input,
    .campo textarea,
    .campo select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid rgba(196,116,138,.25);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--negro);
      background: var(--blanco);
      transition: border-color .2s;
      outline: none;
    }
    .campo input:focus,
    .campo textarea:focus,
    .campo select:focus {
      border-color: var(--rosa);
    }
    .campo textarea { resize: vertical; min-height: 70px; }

    .campo-color {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .campo-color input[type="color"] {
      width: 44px;
      height: 38px;
      padding: 2px;
      border-radius: 8px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .campo-color input[type="text"] { flex: 1; }

    /* Logo upload */
    .logo-upload {
      border: 2px dashed rgba(196,116,138,.35);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      position: relative;
    }
    .logo-upload:hover { border-color: var(--rosa); background: var(--rosa-pal); }
    .logo-upload input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .logo-upload-ico { font-size: 28px; margin-bottom: 6px; }
    .logo-upload-txt { font-size: 12px; color: var(--gris); }
    .logo-preview {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 8px;
      margin: 0 auto 8px;
      display: block;
    }

    /* Plantillas */
    .plantillas-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .plantilla-btn {
      border: 2px solid rgba(196,116,138,.2);
      border-radius: 10px;
      padding: 10px 8px;
      cursor: pointer;
      text-align: center;
      transition: all .2s;
      background: var(--blanco);
      font-family: 'DM Sans', sans-serif;
    }
    .plantilla-btn:hover { border-color: var(--rosa); }
    .plantilla-btn.activa { border-color: var(--rosa); background: var(--rosa-pal); }
    .plantilla-btn .pt-ico { font-size: 22px; display: block; margin-bottom: 4px; }
    .plantilla-btn .pt-nom { font-size: 11px; font-weight: 600; color: var(--negro); }
    .plantilla-btn .pt-desc { font-size: 10px; color: var(--gris); margin-top: 2px; }

    /* Btn generar */
    .btn-generar {
      width: 100%;
      padding: 14px;
      background: var(--rosa-osc);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      margin-top: 20px;
      letter-spacing: .3px;
    }
    .btn-generar:hover { background: var(--negro); transform: translateY(-1px); }

    .btn-descargar {
      width: 100%;
      padding: 12px;
      background: var(--dorado);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      margin-top: 10px;
      letter-spacing: .3px;
    }
    .btn-descargar:hover { background: #B8922E; transform: translateY(-1px); }

    /* ── PREVIEW AREA ── */
    .preview-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 32px;
      gap: 20px;
    }

    .preview-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gris);
    }

    .canvas-wrap {
      position: relative;
      box-shadow: var(--sombra), 0 2px 8px rgba(0,0,0,.08);
      border-radius: 16px;
      overflow: hidden;
    }

    #flyer-canvas {
      display: block;
      border-radius: 16px;
    }

    /* ── CANVAS FLYERS (renderizados con JS en canvas) ── */

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { max-height: none; position: static; }
      .preview-area { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-logo">🌸</div>
  <div>
    <div class="header-titulo">FlyerStudio</div>
    <div class="header-sub">Diseños para tu estética</div>
  </div>
</header>

<div class="layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">

    <div class="seccion-titulo">📍 Tu negocio</div>

    <div class="campo">
      <label>Logo</label>
      <div class="logo-upload" id="logo-drop">
        <input type="file" id="logo-input" accept="image/*">
        <div id="logo-preview-wrap">
          <div class="logo-upload-ico">🖼️</div>
          <div class="logo-upload-txt">Tocá para subir tu logo</div>
        </div>
      </div>
    </div>

    <div class="campo">
      <label>Nombre del negocio</label>
      <input type="text" id="inp-negocio" placeholder="Ej: Estética Valentina" value="Estética Valentina">
    </div>

    <div class="campo">
      <label>Slogan (opcional)</label>
      <input type="text" id="inp-slogan" placeholder="Ej: Belleza que transforma" value="Belleza que transforma">
    </div>

    <div class="campo">
      <label>Teléfono / WhatsApp</label>
      <input type="text" id="inp-tel" placeholder="Ej: +598 099 000 000" value="">
    </div>

    <div class="campo">
      <label>Instagram</label>
      <input type="text" id="inp-ig" placeholder="@tuestética" value="@estetica.valentina">
    </div>

    <div class="campo">
      <label>Dirección (opcional)</label>
      <input type="text" id="inp-dir" placeholder="Ej: Av. 18 de Julio 1234">
    </div>

    <div class="seccion-titulo">🎨 Plantilla</div>

    <div class="plantillas-grid">
      <button class="plantilla-btn activa" data-plantilla="promo" onclick="seleccionarPlantilla(this)">
        <span class="pt-ico">💰</span>
        <span class="pt-nom">Promoción</span>
        <span class="pt-desc">Descuentos y ofertas</span>
      </button>
      <button class="plantilla-btn" data-plantilla="servicios" onclick="seleccionarPlantilla(this)">
        <span class="pt-ico">✂️</span>
        <span class="pt-nom">Servicios</span>
        <span class="pt-desc">Presentá tu menú</span>
      </button>
      <button class="plantilla-btn" data-plantilla="turnos" onclick="seleccionarPlantilla(this)">
        <span class="pt-ico">📅</span>
        <span class="pt-nom">Turnos</span>
        <span class="pt-desc">Lugares disponibles</span>
      </button>
      <button class="plantilla-btn" data-plantilla="frase" onclick="seleccionarPlantilla(this)">
        <span class="pt-ico">✨</span>
        <span class="pt-nom">Frase</span>
        <span class="pt-desc">Motivacional / branding</span>
      </button>
    </div>

    <div class="seccion-titulo">✏️ Contenido</div>

    <div id="campos-contenido">
      <!-- Se renderizan dinámicamente según plantilla -->
    </div>

    <div class="seccion-titulo">🎨 Colores</div>

    <div class="campo">
      <label>Color principal</label>
      <div class="campo-color">
        <input type="color" id="color-principal" value="#C4748A">
        <input type="text" id="color-principal-txt" value="#C4748A">
      </div>
    </div>

    <div class="campo">
      <label>Color de fondo</label>
      <div class="campo-color">
        <input type="color" id="color-fondo" value="#1A1018">
        <input type="text" id="color-fondo-txt" value="#1A1018">
      </div>
    </div>

    <button class="btn-generar" onclick="generarFlyer()">🌸 Generar flyer</button>
    <button class="btn-descargar" onclick="descargarFlyer()">⬇️ Descargar PNG</button>

  </aside>

  <!-- ── PREVIEW ── -->
  <div class="preview-area">
    <div class="preview-label">Vista previa — 1080 × 1080 px</div>
    <div class="canvas-wrap">
      <canvas id="flyer-canvas" width="1080" height="1080" style="width:500px;height:500px;"></canvas>
    </div>
  </div>

</div>

<script>
// ── ESTADO ──
let plantillaActual = 'promo';
let logoImg = null;

// ── LOGO UPLOAD ──
document.getElementById('logo-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      logoImg = img;
      document.getElementById('logo-preview-wrap').innerHTML = `
        <img src="${ev.target.result}" class="logo-preview" alt="Logo">
        <div class="logo-upload-txt">Logo cargado ✅</div>
      `;
      generarFlyer();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ── SINCRONIZAR COLORES ──
document.getElementById('color-principal').addEventListener('input', (e) => {
  document.getElementById('color-principal-txt').value = e.target.value;
});
document.getElementById('color-fondo').addEventListener('input', (e) => {
  document.getElementById('color-fondo-txt').value = e.target.value;
});
document.getElementById('color-principal-txt').addEventListener('input', (e) => {
  if (/^#[0-9A-Fa-f]{6}$/.test(e.target.value))
    document.getElementById('color-principal').value = e.target.value;
});
document.getElementById('color-fondo-txt').addEventListener('input', (e) => {
  if (/^#[0-9A-Fa-f]{6}$/.test(e.target.value))
    document.getElementById('color-fondo').value = e.target.value;
});

// ── PLANTILLAS: campos dinámicos ──
const camposPorPlantilla = {
  promo: `
    <div class="campo">
      <label>Título de la promo</label>
      <input type="text" id="c-titulo" placeholder="Ej: 30% OFF en depilación" value="30% OFF en depilación">
    </div>
    <div class="campo">
      <label>Descripción</label>
      <textarea id="c-desc" placeholder="Ej: Válido todo el mes de mayo">Válido todo el mes de mayo\nReservá tu turno ya</textarea>
    </div>
    <div class="campo">
      <label>Descuento / precio destacado</label>
      <input type="text" id="c-precio" placeholder="Ej: 30% OFF" value="30% OFF">
    </div>
  `,
  servicios: `
    <div class="campo">
      <label>Título</label>
      <input type="text" id="c-titulo" placeholder="Nuestros servicios" value="Nuestros servicios">
    </div>
    <div class="campo">
      <label>Servicios (uno por línea)</label>
      <textarea id="c-servicios" placeholder="Depilación láser&#10;Manicura&#10;Faciales&#10;Masajes">Depilación láser
Manicura y pedicura
Faciales premium
Masajes relajantes</textarea>
    </div>
  `,
  turnos: `
    <div class="campo">
      <label>Título</label>
      <input type="text" id="c-titulo" placeholder="¡Turnos disponibles!" value="¡Turnos disponibles!">
    </div>
    <div class="campo">
      <label>Mensaje</label>
      <textarea id="c-desc" placeholder="Horarios disponibles esta semana">Esta semana tenemos\nlugares disponibles\nNo te quedes sin el tuyo</textarea>
    </div>
    <div class="campo">
      <label>Llamado a la acción</label>
      <input type="text" id="c-cta" placeholder="Escribinos al WA" value="Escribinos al WA">
    </div>
  `,
  frase: `
    <div class="campo">
      <label>Frase principal</label>
      <textarea id="c-frase" placeholder="La belleza es una forma de expresión">"La belleza\nes una forma\nde expresión"</textarea>
    </div>
    <div class="campo">
      <label>Subtítulo (opcional)</label>
      <input type="text" id="c-subtitulo" placeholder="Tu lugar de confianza">Tu lugar de confianza</div>
    </div>
  `,
};

function seleccionarPlantilla(btn) {
  document.querySelectorAll('.plantilla-btn').forEach(b => b.classList.remove('activa'));
  btn.classList.add('activa');
  plantillaActual = btn.dataset.plantilla;
  document.getElementById('campos-contenido').innerHTML = camposPorPlantilla[plantillaActual];
  generarFlyer();
}

// Init campos
document.getElementById('campos-contenido').innerHTML = camposPorPlantilla['promo'];

// ── HELPERS CANVAS ──
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function lighten(hex, amount) {
  const {r,g,b} = hexToRgb(hex);
  const l = amount;
  return `rgb(${Math.min(255,r+l)},${Math.min(255,g+l)},${Math.min(255,b+l)})`;
}

function darken(hex, amount) {
  const {r,g,b} = hexToRgb(hex);
  return `rgb(${Math.max(0,r-amount)},${Math.max(0,g-amount)},${Math.max(0,b-amount)})`;
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  let lines = [];
  for (let w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  if (line) lines.push(line);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineHeight));
  return lines.length;
}

// ── GENERADOR PRINCIPAL ──
function generarFlyer() {
  const canvas = document.getElementById('flyer-canvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;

  const negocio  = document.getElementById('inp-negocio').value || 'Mi Estética';
  const slogan   = document.getElementById('inp-slogan').value || '';
  const tel      = document.getElementById('inp-tel').value || '';
  const ig       = document.getElementById('inp-ig').value || '';
  const dir      = document.getElementById('inp-dir').value || '';
  const colorP   = document.getElementById('color-principal').value || '#C4748A';
  const colorF   = document.getElementById('color-fondo').value || '#1A1018';

  ctx.clearRect(0, 0, W, H);

  switch (plantillaActual) {
    case 'promo':     dibujarPromo(ctx, W, H, {negocio, slogan, tel, ig, dir, colorP, colorF}); break;
    case 'servicios': dibujarServicios(ctx, W, H, {negocio, slogan, tel, ig, dir, colorP, colorF}); break;
    case 'turnos':    dibujarTurnos(ctx, W, H, {negocio, slogan, tel, ig, dir, colorP, colorF}); break;
    case 'frase':     dibujarFrase(ctx, W, H, {negocio, slogan, tel, ig, dir, colorP, colorF}); break;
  }
}

// ── PLANTILLA 1: PROMO ──
function dibujarPromo(ctx, W, H, d) {
  const titulo  = document.getElementById('c-titulo')?.value || '';
  const desc    = document.getElementById('c-desc')?.value || '';
  const precio  = document.getElementById('c-precio')?.value || '';

  // Fondo
  ctx.fillStyle = d.colorF;
  ctx.fillRect(0, 0, W, H);

  // Círculo decorativo grande
  const grad = ctx.createRadialGradient(W*0.75, H*0.25, 0, W*0.75, H*0.25, 500);
  grad.addColorStop(0, d.colorP + '55');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Línea diagonal decorativa
  ctx.save();
  ctx.strokeStyle = d.colorP + '30';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, H * 0.55);
  ctx.lineTo(W, H * 0.35);
  ctx.stroke();
  ctx.restore();

  // Banda de color superior
  ctx.fillStyle = d.colorP;
  ctx.fillRect(0, 0, W, 12);

  // LOGO
  let yStart = 80;
  if (logoImg) {
    const lSize = 130;
    ctx.save();
    ctx.beginPath();
    ctx.arc(W/2, yStart + lSize/2, lSize/2, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(logoImg, W/2 - lSize/2, yStart, lSize, lSize);
    ctx.restore();
    yStart += lSize + 30;
  } else {
    yStart = 110;
  }

  // Nombre negocio
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `700 52px 'Playfair Display', serif`;
  ctx.textAlign = 'center';
  ctx.fillText(negocio || d.negocio, W/2, yStart);
  yStart += 48;

  if (d.slogan) {
    ctx.fillStyle = d.colorP;
    ctx.font = `400 26px 'DM Sans', sans-serif`;
    ctx.fillText(d.slogan, W/2, yStart);
    yStart += 40;
  }

  // Separador
  ctx.strokeStyle = d.colorP + '60';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(W/2 - 120, yStart + 10);
  ctx.lineTo(W/2 + 120, yStart + 10);
  ctx.stroke();
  yStart += 60;

  // PRECIO/DESCUENTO — círculo destacado
  if (precio) {
    ctx.save();
    const px = W * 0.72, py = yStart + 10;
    ctx.beginPath();
    ctx.arc(px, py, 150, 0, Math.PI*2);
    ctx.fillStyle = d.colorP;
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = `900 88px 'Playfair Display', serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Ajustar tamaño si es muy largo
    if (precio.length > 6) ctx.font = `900 58px 'Playfair Display', serif`;
    ctx.fillText(precio, px, py);
    ctx.restore();
  }

  // TÍTULO PROMO
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `700 68px 'Playfair Display', serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  const maxW = precio ? W * 0.55 - 80 : W - 160;
  const lines = titulo.split('\n');
  let ty = yStart - 70;
  lines.forEach(line => {
    wrapText(ctx, line, 80, ty, maxW, 80);
    ty += 80;
  });
  yStart += 200;

  // DESCRIPCIÓN
  ctx.fillStyle = lighten(d.colorF, 160);
  ctx.font = `400 32px 'DM Sans', sans-serif`;
  ctx.textAlign = 'left';
  const descLines = desc.split('\n');
  descLines.forEach(line => {
    ctx.fillText(line, 80, yStart);
    yStart += 44;
  });
  yStart += 30;

  // FOOTER
  dibujarFooter(ctx, W, H, d);
}

// ── PLANTILLA 2: SERVICIOS ──
function dibujarServicios(ctx, W, H, d) {
  const titulo    = document.getElementById('c-titulo')?.value || 'Nuestros servicios';
  const servicios = (document.getElementById('c-servicios')?.value || '').split('\n').filter(Boolean);

  // Fondo degradado
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, d.colorF);
  grad.addColorStop(1, darken(d.colorF, 30));
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Patrón de puntos decorativo
  ctx.fillStyle = d.colorP + '15';
  for (let x = 0; x < W; x += 40) {
    for (let y = 0; y < H; y += 40) {
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Banda lateral
  ctx.fillStyle = d.colorP;
  ctx.fillRect(0, 0, 16, H);

  // LOGO
  let yStart = 80;
  if (logoImg) {
    const lSize = 110;
    ctx.save();
    ctx.beginPath();
    ctx.arc(140, yStart + lSize/2, lSize/2, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(logoImg, 85, yStart, lSize, lSize);
    ctx.restore();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = `700 44px 'Playfair Display', serif`;
    ctx.textAlign = 'left';
    ctx.fillText(d.negocio, 220, yStart + 55);
    if (d.slogan) {
      ctx.fillStyle = d.colorP;
      ctx.font = `400 22px 'DM Sans', sans-serif`;
      ctx.fillText(d.slogan, 220, yStart + 88);
    }
    yStart += lSize + 50;
  } else {
    ctx.fillStyle = '#FFFFFF';
    ctx.font = `700 52px 'Playfair Display', serif`;
    ctx.textAlign = 'center';
    ctx.fillText(d.negocio, W/2, yStart + 40);
    yStart += 100;
  }

  // Título
  ctx.fillStyle = d.colorP;
  ctx.font = `900 72px 'Playfair Display', serif`;
  ctx.textAlign = 'center';
  ctx.fillText(titulo, W/2, yStart);
  yStart += 30;

  // Línea
  ctx.strokeStyle = d.colorP;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(80, yStart + 10);
  ctx.lineTo(W - 80, yStart + 10);
  ctx.stroke();
  yStart += 60;

  // Servicios en dos columnas
  const col1 = servicios.slice(0, Math.ceil(servicios.length / 2));
  const col2 = servicios.slice(Math.ceil(servicios.length / 2));
  const colW = (W - 200) / 2;

  const dibujarListaServs = (lista, x, startY) => {
    lista.forEach((serv, i) => {
      const iy = startY + i * 80;
      // Bullet
      ctx.fillStyle = d.colorP;
      ctx.beginPath();
      ctx.arc(x + 15, iy - 10, 8, 0, Math.PI*2);
      ctx.fill();
      // Texto
      ctx.fillStyle = '#FFFFFF';
      ctx.font = `500 34px 'DM Sans', sans-serif`;
      ctx.textAlign = 'left';
      ctx.fillText(serv, x + 36, iy);
    });
  };

  dibujarListaServs(col1, 80, yStart);
  if (col2.length > 0) dibujarListaServs(col2, W/2 + 20, yStart);

  dibujarFooter(ctx, W, H, d);
}

// ── PLANTILLA 3: TURNOS ──
function dibujarTurnos(ctx, W, H, d) {
  const titulo = document.getElementById('c-titulo')?.value || '¡Turnos disponibles!';
  const desc   = document.getElementById('c-desc')?.value || '';
  const cta    = document.getElementById('c-cta')?.value || '';

  // Fondo rosa pálido
  const rgb = hexToRgb(d.colorP);
  ctx.fillStyle = `rgb(${Math.min(255,rgb.r+100)},${Math.min(255,rgb.g+80)},${Math.min(255,rgb.b+85)})`;
  ctx.fillRect(0, 0, W, H);

  // Manchas decorativas
  const grad1 = ctx.createRadialGradient(200, 200, 0, 200, 200, 400);
  grad1.addColorStop(0, d.colorP + '40');
  grad1.addColorStop(1, 'transparent');
  ctx.fillStyle = grad1;
  ctx.fillRect(0, 0, W, H);

  const grad2 = ctx.createRadialGradient(W-200, H-200, 0, W-200, H-200, 500);
  grad2.addColorStop(0, d.colorF + '25');
  grad2.addColorStop(1, 'transparent');
  ctx.fillStyle = grad2;
  ctx.fillRect(0, 0, W, H);

  // Tarjeta central
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,.15)';
  ctx.shadowBlur = 60;
  ctx.shadowOffsetY = 20;
  roundRect(ctx, 80, 180, W - 160, H - 360, 30);
  ctx.fillStyle = '#FFFFFF';
  ctx.fill();
  ctx.restore();

  // LOGO + Nombre
  let yStart = 80;
  if (logoImg) {
    const lSize = 120;
    ctx.save();
    ctx.beginPath();
    ctx.arc(W/2, yStart + lSize/2, lSize/2, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(logoImg, W/2 - lSize/2, yStart, lSize, lSize);
    ctx.restore();
    yStart += lSize + 20;
  }

  ctx.fillStyle = d.colorF;
  ctx.font = `700 44px 'Playfair Display', serif`;
  ctx.textAlign = 'center';
  ctx.fillText(d.negocio, W/2, yStart + 30);
  yStart += 80;

  // Contenido tarjeta
  let cardY = 260;

  // Ícono calendario
  ctx.font = `80px serif`;
  ctx.textAlign = 'center';
  ctx.fillText('📅', W/2, cardY + 60);
  cardY += 100;

  // Título
  ctx.fillStyle = d.colorP;
  ctx.font = `900 72px 'Playfair Display', serif`;
  ctx.textAlign = 'center';
  wrapText(ctx, titulo, W/2, cardY, W - 200, 85);
  cardY += 85 * Math.ceil(titulo.length / 20) + 30;

  // Descripción
  ctx.fillStyle = '#5A4A50';
  ctx.font = `400 34px 'DM Sans', sans-serif`;
  const descLines = desc.split('\n').filter(Boolean);
  descLines.forEach(line => {
    ctx.fillText(line, W/2, cardY);
    cardY += 50;
  });
  cardY += 30;

  // CTA button simulado
  if (cta) {
    ctx.save();
    ctx.shadowColor = d.colorP + '60';
    ctx.shadowBlur = 30;
    const btnW = 500, btnH = 80, btnX = W/2 - btnW/2, btnY = cardY;
    roundRect(ctx, btnX, btnY, btnW, btnH, 40);
    ctx.fillStyle = d.colorP;
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#FFFFFF';
    ctx.font = `600 32px 'DM Sans', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(cta, W/2, btnY + 50);
  }

  dibujarFooter(ctx, W, H, d);
}

// ── PLANTILLA 4: FRASE ──
function dibujarFrase(ctx, W, H, d) {
  const frase    = document.getElementById('c-frase')?.value || '';
  const subtitulo = document.getElementById('c-subtitulo')?.value || '';

  // Fondo oscuro con textura
  ctx.fillStyle = d.colorF;
  ctx.fillRect(0, 0, W, H);

  // Líneas de textura sutil
  ctx.strokeStyle = d.colorP + '08';
  ctx.lineWidth = 1;
  for (let i = 0; i < H; i += 30) {
    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(W, i);
    ctx.stroke();
  }

  // Gradiente lateral
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, d.colorP + '20');
  grad.addColorStop(0.5, 'transparent');
  grad.addColorStop(1, d.colorP + '15');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Marco decorativo
  ctx.strokeStyle = d.colorP + '50';
  ctx.lineWidth = 3;
  ctx.strokeRect(40, 40, W - 80, H - 80);
  ctx.strokeStyle = d.colorP + '25';
  ctx.lineWidth = 1;
  ctx.strokeRect(55, 55, W - 110, H - 110);

  // Esquinas decorativas
  const esq = (x, y, dx, dy) => {
    ctx.strokeStyle = d.colorP;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(x, y + dy * 60);
    ctx.lineTo(x, y);
    ctx.lineTo(x + dx * 60, y);
    ctx.stroke();
  };
  esq(60, 60, 1, 1);
  esq(W-60, 60, -1, 1);
  esq(60, H-60, 1, -1);
  esq(W-60, H-60, -1, -1);

  // LOGO
  let yStart = 120;
  if (logoImg) {
    const lSize = 100;
    ctx.save();
    ctx.beginPath();
    ctx.arc(W/2, yStart + lSize/2, lSize/2, 0, Math.PI*2);
    ctx.clip();
    ctx.drawImage(logoImg, W/2 - lSize/2, yStart, lSize, lSize);
    ctx.restore();
    yStart += lSize + 20;
  }

  // Nombre negocio
  ctx.fillStyle = d.colorP;
  ctx.font = `400 30px 'DM Sans', sans-serif`;
  ctx.textAlign = 'center';
  ctx.letterSpacing = '4px';
  ctx.fillText(d.negocio.toUpperCase(), W/2, yStart + 20);
  yStart += 60;

  // Comilla apertura
  ctx.fillStyle = d.colorP + '60';
  ctx.font = `300 200px 'Playfair Display', serif`;
  ctx.textAlign = 'left';
  ctx.fillText('"', 80, yStart + 120);

  // FRASE
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `700 italic 78px 'Playfair Display', serif`;
  ctx.textAlign = 'center';
  const fraseLines = frase.replace(/"/g, '').split('\n').filter(Boolean);
  let fy = yStart + 120;
  fraseLines.forEach(line => {
    ctx.fillText(line, W/2, fy);
    fy += 95;
  });

  // Comilla cierre
  ctx.fillStyle = d.colorP + '60';
  ctx.font = `300 200px 'Playfair Display', serif`;
  ctx.textAlign = 'right';
  ctx.fillText('"', W - 80, fy - 30);

  // Línea decorativa
  ctx.strokeStyle = d.colorP;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W/2 - 100, fy + 20);
  ctx.lineTo(W/2 + 100, fy + 20);
  ctx.stroke();

  // Subtítulo
  if (subtitulo) {
    ctx.fillStyle = lighten(d.colorF, 150);
    ctx.font = `400 32px 'DM Sans', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(subtitulo, W/2, fy + 70);
  }

  dibujarFooter(ctx, W, H, d);
}

// ── FOOTER COMÚN ──
function dibujarFooter(ctx, W, H, d) {
  const tel = d.tel;
  const ig  = d.ig;
  const dir = d.dir;

  // Banda footer
  ctx.fillStyle = d.colorP;
  ctx.fillRect(0, H - 100, W, 100);

  ctx.fillStyle = '#FFFFFF';
  ctx.font = `500 28px 'DM Sans', sans-serif`;
  ctx.textAlign = 'center';

  let footerTxt = '';
  if (tel) footerTxt += `📞 ${tel}`;
  if (ig)  footerTxt += `   ${ig}`;
  if (dir) footerTxt += `   📍 ${dir}`;

  if (footerTxt) {
    ctx.fillText(footerTxt, W/2, H - 55);
  }

  // Línea top footer
  ctx.strokeStyle = '#FFFFFF40';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(80, H - 100);
  ctx.lineTo(W - 80, H - 100);
  ctx.stroke();
}

// ── HELPER ROUNDRECT ──
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── DESCARGAR ──
function descargarFlyer() {
  generarFlyer();
  const canvas = document.getElementById('flyer-canvas');
  const link = document.createElement('a');
  link.download = `flyer-${plantillaActual}-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ── AUTO-RENDER al cambiar inputs ──
document.querySelectorAll('input, textarea, select').forEach(el => {
  el.addEventListener('input', () => generarFlyer());
});

// Observar cambios en campos dinámicos
const observer = new MutationObserver(() => {
  document.querySelectorAll('#campos-contenido input, #campos-contenido textarea').forEach(el => {
    el.addEventListener('input', () => generarFlyer());
  });
});
observer.observe(document.getElementById('campos-contenido'), { childList: true });

// ── RENDER INICIAL ──
generarFlyer();
</script>
